<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter Badge</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+1+Code:wght@100..700&family=Noto+Sans+Mono:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "M PLUS 1 Code", monospace;
        background: linear-gradient(to right, #000000, #152331);
        color: #eee;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
        min-height: 100vh;
        margin: 0;
        box-sizing: border-box;
      }
      h1 {
        color: #fff;
        margin-bottom: 2rem;
        text-align: center;
        font-weight: 300;
        letter-spacing: 0.05em;
      }
      .theme-grid {
        display: grid;
        grid-template-columns: 1fr;
        grid-auto-rows: 1fr;
        gap: 1.5rem;
        width: 100%;
        max-width: 800px;
      }
      @media (min-width: 640px) {
        .theme-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      .theme-item {
        background: rgba(255, 255, 255, 0.05);
        padding: 1.5rem;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        cursor: pointer;
        transition:
          transform 0.2s ease,
          background 0.2s ease,
          box-shadow 0.2s ease;
        color: #eee;
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }
      .theme-item:hover {
        transform: translateY(-4px);
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        border-color: rgba(255, 255, 255, 0.2);
      }
      .theme-name {
        font-weight: bold;
        word-break: break-all;
        color: #fff;
        font-size: 0.9rem;
        opacity: 0.9;
      }
      .theme-item img {
        max-width: 100%;
        height: auto;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Counter Badge</h1>
    <div class="theme-grid" id="themeGrid">
      <a class="theme-item" href="/index">
        <div class="theme-name">moebooru (default)</div>
        <img src="/index" alt="moebooru" />
      </a>
      <a class="theme-item" href="/index?theme=number">
        <div class="theme-name">number</div>
        <img src="/index?theme=number" alt="number" />
      </a>
      <a class="theme-item" href="/index?theme=moebooru-h&padding=10">
        <div class="theme-name">moebooru-h (padding=10, default 8)</div>
        <img src="/index?theme=moebooru-h&padding=10" alt="moebooru-h" />
      </a>
      <a class="theme-item" href="/index?theme=nixietube&scale=0.5">
        <div class="theme-name">nixietube (scale=0.5, default 1.0)</div>
        <img src="/index?theme=nixietube&scale=0.5" alt="nixietube" />
      </a>
    </div>
    {{ if .CFToken }}
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon="{{.CFToken}}"
    ></script>
    {{ end }}
  </body>
</html>
